<!DOCTYPE html>
<html>
    <head>
        <title>Regestration</title>
        <link rel="stylesheet" href="style1.css">

    <body>
        <center>
            <h1 style="font-size: 300%; "><i>Registration Page</i></h1><br><br><br><br>

                </table><br><br>

            </form>
